; =============================================================================
; PlatformIO Project Configuration File
; =============================================================================
; Author: Markus van Kempen | markus.van.kempen@gmail.com
; Organization: Research | Floor 7½ 🏢🤏
; Motto: "No bug too small, no syntax too weird."
;
; Project: TTGO T-Beam (T22 V1.1 20191212) Sensor Node with WiFi Dashboard
;
; Description:
;   Configuration for ESP32-based IoT sensor node with LoRaWAN connectivity
;   and real-time web dashboard. Integrates environmental sensors, GPS tracking,
;   OLED display, and WiFi web interface with Google Maps.
;
; Hardware Target:
;   - Board: TTGO T-Beam T22 V1.1 (20191212 variant)
;   - MCU: ESP32 (Espressif)
;   - LoRa: SX1276 (US915 region)
;
; Build Configuration:
;   - Framework: Arduino
;   - Monitor Speed: 115200 baud
;   - LoRaWAN Region: US915 (North America)
;   - Radio: SX1276
;
; Library Dependencies:
;   Core Sensors & Display:
;     - Adafruit SSD1306: OLED display driver
;     - Adafruit GFX: Graphics library
;     - Adafruit BME280: Environmental sensor (temp/humidity/pressure)
;     - TinyGPSPlus: GPS NMEA parser
;
;   LoRaWAN:
;     - MCCI LoRaWAN LMIC: LoRaWAN stack
;     - CayenneLPP: Payload formatter
;
;   WiFi & Web:
;     - ArduinoJson: JSON serialization for API
;     - ESPAsyncWebServer: Non-blocking web server
;     - AsyncTCP: Async TCP library for ESP32
;
; Build Flags:
;   - ARDUINO_LMIC_PROJECT_CONFIG_H_SUPPRESS: Use custom LMIC config
;   - CFG_us915: Enable US915 frequency band
;   - CFG_sx1276_radio: Select SX1276 radio chip
;   - hal_init=LMIC_hal_init: LMIC HAL initialization
;
; Upload Instructions:
;   platformio run --target upload --upload-port /dev/cu.usbserial-XXXXXXXX
;
; Monitor Instructions:
;   platformio device monitor --baud 115200 --port /dev/cu.usbserial-XXXXXXXX
;
; Documentation:
;   See README.md for general information
;   See WIFI_SETUP.md for WiFi dashboard setup
;
; =============================================================================

[env:ttgo-t-beam]
platform = espressif32
board = ttgo-t-beam
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
	-D ARDUINO_LMIC_PROJECT_CONFIG_H_SUPPRESS
	-D CFG_us915=1
	-D CFG_sx1276_radio=1
	-D hal_init=LMIC_hal_init
	-D MQTT_MAX_PACKET_SIZE=512
lib_deps =
	adafruit/Adafruit SSD1306 @ ^2.5.11
	adafruit/Adafruit GFX Library @ ^1.11.10
	adafruit/Adafruit BME280 Library @ ^2.2.4
	mikalhart/TinyGPSPlus @ ^1.1.0
	mcci-catena/MCCI LoRaWAN LMIC library @ ^4.1.1
	electroniccats/CayenneLPP @ ^1.3.1
	bblanchon/ArduinoJson @ ^7.2.1
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	https://github.com/me-no-dev/AsyncTCP.git
	h2zero/NimBLE-Arduino @ ^1.4.2
	knolleary/PubSubClient @ ^2.8
